<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selvene Technologies | Intelligent Software</title>
    <meta name="description" content="Selvene Technologies is a UK-based app development company building AI-powered applications across consumer categories.">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            background-color: #0a1628;
            color: #ffffff;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .page {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-bottom: 5vh;
        }

        /* Background */
        .bg {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        .bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        /* Content */
        .content {
            position: relative;
            z-index: 1;
            padding-left: 8vw;
            padding-right: 8vw;
            max-width: 700px;
        }

        .logo {
            width: 100%;
            max-width: 480px;
            height: auto;
            margin-bottom: 1.8rem;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeUp 1s ease-out 0.3s forwards;
        }

        .tagline {
            font-size: clamp(1.1rem, 2.5vw, 1.5rem);
            font-weight: 300;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeUp 1s ease-out 0.6s forwards;
        }

        .divider {
            width: 60px;
            height: 1px;
            background: rgba(255, 255, 255, 0.3);
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.8s forwards;
        }

        .description {
            font-size: clamp(0.95rem, 1.5vw, 1.1rem);
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.65);
            font-weight: 300;
            margin-bottom: 2.5rem;
            max-width: 520px;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeUp 1s ease-out 1s forwards;
        }

        .contact {
            opacity: 0;
            transform: translateY(12px);
            animation: fadeUp 1s ease-out 1.2s forwards;
        }

        .contact a {
            color: rgba(255, 255, 255, 0.55);
            text-decoration: none;
            font-size: clamp(0.85rem, 1.2vw, 0.95rem);
            font-weight: 300;
            letter-spacing: 0.08em;
            transition: color 0.3s ease;
        }

        .contact a:hover {
            color: rgba(255, 255, 255, 0.9);
        }

        /* Footer */
        .footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1;
            padding: 1.5rem 8vw;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .footer img {
            height: 14px;
            width: auto;
            opacity: 0.35;
        }

        .footer-right {
            text-align: right;
            font-family: 'Nunito', sans-serif;
            font-weight: 300;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.35);
            line-height: 1.5;
        }

        /* Animations */
        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .content {
                padding-left: 6vw;
                padding-right: 6vw;
            }

            .logo {
                max-width: 320px;
            }

            .footer {
                padding: 1.2rem 6vw;
            }

            .footer img {
                height: 11px;
            }

            .footer-right {
                font-size: 0.6rem;
            }
        }

        @media (max-width: 480px) {
            .content {
                padding-left: 7vw;
                padding-right: 7vw;
            }

            .logo {
                max-width: 260px;
            }

            .tagline {
                letter-spacing: 0.15em;
            }
        }

        /* Tall/narrow screens - adjust vertical position */
        @media (max-height: 600px) {
            .content {
                padding-top: 2rem;
            }

            .logo {
                margin-bottom: 1rem;
            }

            .tagline {
                margin-bottom: 1.2rem;
            }

            .divider {
                margin-bottom: 1.2rem;
            }

            .description {
                margin-bottom: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="bg">
            <img src="SelveneBackground.jpg" alt="" role="presentation">
        </div>

        <div class="content">
            <img src="SelveneTitleLine.png" alt="Selvene Technologies" class="logo">
            <div class="tagline">Intelligent Software</div>
            <div class="divider"></div>
            <p class="description">Selvene Technologies is a UK-based app development company building AI-powered applications across consumer categories.</p>
            <div class="contact">
                <a href="mailto:contact@selvenetech.com">contact@selvenetech.com</a>
            </div>
        </div>

        <div class="footer">
            <img src="SelveneCopyright.png" alt="© 2026 Selvene Technologies LTD. All rights reserved">
            <div class="footer-right">
                Company Number: 17160461<br>
                Registered Office: 71-75 Shelton Street, Covent Garden, London WC2H 9JQ. United Kingdom
            </div>
        </div>
    </div>
</body>
</html>
